services:
  # ── Backend API ────────────────────────────────────────────────
  - type: web
    name: macgly-api
    runtime: node
    rootDir: apps/api
    buildCommand: npm install
    startCommand: node src/server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://macgly-web.onrender.com
      - key: MONGO_URI
        sync: false           # Fill in Render dashboard → MongoDB Atlas URL
      - key: JWT_ACCESS_SECRET
        generateValue: true   # Auto-generated by Render
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CLOUDINARY_CLOUD_NAME
        sync: false           # Optional — needed for image uploads
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false           # Optional — needed for online payments
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: MAILERSEND_API_KEY
        sync: false           # Optional — needed for emails

  # ── Frontend Static Site ───────────────────────────────────────
  - type: web
    name: macgly-web
    runtime: static
    rootDir: apps/web
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://macgly-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
